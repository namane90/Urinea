<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>우리집 정산</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #007aff;
      --danger: #ff3b30;
      --success: #34c759;
      --warning: #ff9500;
      --bg: #f2f2f7;
      --card: #ffffff;
      --text: #1c1c1e;
      --text2: #8e8e93;
      --border: #e5e5ea;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text);
      max-width: 480px; margin: 0 auto; min-height: 100vh;
    }
    .header {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      padding: 14px 20px 12px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
    }
    .header-inner { display: flex; align-items: center; justify-content: space-between; }
    .header-title { font-size: 20px; font-weight: 700; }
    .header-sub { font-size: 13px; color: var(--text2); margin-top: 1px; }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #c7c7cc; flex-shrink: 0;
      transition: background 0.4s;
    }
    .status-dot.on  { background: var(--success); }
    .status-dot.err { background: var(--danger); }
    .nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex; z-index: 50;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .nav-item {
      flex: 1; padding: 10px 0 12px; text-align: center;
      cursor: pointer; font-size: 10px; color: var(--text2);
      -webkit-tap-highlight-color: transparent; transition: color 0.15s;
    }
    .nav-item.active { color: var(--primary); }
    .nav-icon { font-size: 22px; display: block; margin-bottom: 3px; }
    .view { display: none; padding: 16px 16px 90px; }
    .view.active { display: block; }
    .card {
      background: var(--card); border-radius: 14px;
      padding: 16px; margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .month-nav {
      display: flex; align-items: center; justify-content: center; gap: 20px;
      background: var(--card); border-radius: 14px; padding: 14px;
      margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .month-btn {
      width: 36px; height: 36px; border: none; background: var(--bg);
      border-radius: 50%; cursor: pointer; font-size: 20px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .month-display { font-size: 17px; font-weight: 700; min-width: 110px; text-align: center; }
    .summary-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 12px; }
    .summary-box {
      background: var(--card); border-radius: 14px; padding: 12px 8px;
      text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .summary-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .summary-value { font-size: 15px; font-weight: 700; }
    .c-blue { color: var(--primary); } .c-red { color: var(--danger); }
    .c-green { color: var(--success); } .c-orange { color: var(--warning); }
    .expense-item {
      display: flex; align-items: center; padding: 12px 0;
      border-bottom: 1px solid var(--bg); cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .expense-item:last-child { border-bottom: none; }
    .expense-icon {
      width: 42px; height: 42px; background: var(--bg); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0; margin-right: 12px;
    }
    .expense-info { flex: 1; min-width: 0; }
    .expense-desc { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .expense-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }
    .expense-right { text-align: right; flex-shrink: 0; margin-left: 8px; }
    .expense-amount { font-size: 16px; font-weight: 600; }
    .expense-payer { font-size: 11px; color: var(--text2); margin-top: 3px; }
    .sec-title {
      font-size: 12px; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px 4px;
    }
    .empty { text-align: center; padding: 50px 20px; }
    .empty-icon { font-size: 52px; margin-bottom: 14px; }
    .empty-text { font-size: 16px; color: var(--text2); }
    .empty-sub { font-size: 13px; color: #c7c7cc; margin-top: 6px; }
    .form-label {
      font-size: 12px; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block;
    }
    .form-group { margin-bottom: 20px; }
    .form-input {
      width: 100%; padding: 13px 14px;
      border: 1.5px solid var(--border); border-radius: 12px;
      font-size: 16px; outline: none; background: var(--card); color: var(--text);
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    .form-input:focus { border-color: var(--primary); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .chip {
      padding: 12px 6px; border: 1.5px solid var(--border); border-radius: 12px;
      text-align: center; cursor: pointer; font-size: 14px; font-weight: 500;
      transition: all 0.15s; user-select: none; background: var(--card);
      -webkit-tap-highlight-color: transparent;
    }
    .chip.sel-blue { background: var(--primary); border-color: var(--primary); color: #fff; }
    .chip.sel-orange { background: var(--warning); border-color: var(--warning); color: #fff; }
    .photo-upload {
      border: 2px dashed var(--border); border-radius: 12px; padding: 24px;
      text-align: center; cursor: pointer; background: var(--bg);
      -webkit-tap-highlight-color: transparent;
    }
    .photo-prev-wrap { position: relative; }
    .photo-prev { width: 100%; max-height: 220px; object-fit: cover; border-radius: 10px; display: block; }
    .photo-remove {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.55); color: #fff; border: none;
      border-radius: 50%; width: 30px; height: 30px; cursor: pointer;
      font-size: 16px; display: flex; align-items: center; justify-content: center;
    }
    .btn {
      width: 100%; padding: 15px; border: none; border-radius: 14px;
      font-size: 17px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.75; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-ghost   { background: var(--bg); color: var(--text); }
    .settle-item {
      display: flex; align-items: center; padding: 13px 14px;
      background: #f0f7ff; border-radius: 12px; margin-bottom: 8px;
    }
    .settle-from { font-size: 15px; font-weight: 600; flex: 1; }
    .settle-arrow { color: var(--primary); margin: 0 8px; font-size: 18px; flex-shrink: 0; }
    .settle-to { font-size: 15px; font-weight: 600; flex: 1; text-align: right; }
    .settle-amount { font-size: 17px; font-weight: 700; color: var(--primary); min-width: 90px; text-align: right; }
    .balance-row {
      display: flex; align-items: center; padding: 11px 0;
      border-bottom: 1px solid var(--bg);
    }
    .balance-row:last-child { border-bottom: none; }
    .balance-name { font-size: 14px; font-weight: 500; width: 56px; flex-shrink: 0; }
    .balance-bar-bg { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; margin: 0 10px; overflow: hidden; }
    .balance-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .balance-num { font-size: 14px; font-weight: 600; min-width: 80px; text-align: right; }
    .toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(28,28,30,0.9); color: #fff;
      padding: 10px 22px; border-radius: 20px; font-size: 14px; z-index: 999;
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 100; display: flex; align-items: flex-end;
    }
    .modal-bg.hidden { display: none; }
    .modal {
      background: var(--card); border-radius: 20px 20px 0 0;
      padding: 20px; width: 100%; max-height: 85vh; overflow-y: auto;
      padding-bottom: calc(20px + env(safe-area-inset-bottom, 0));
    }
    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
    .setting-row {
      display: flex; align-items: center; padding: 12px 0;
      border-bottom: 1px solid var(--bg);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-num {
      width: 30px; height: 30px; background: var(--primary); color: #fff;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0; margin-right: 12px;
    }
    .setting-input {
      flex: 1; border: none; outline: none;
      font-size: 16px; background: transparent; color: var(--text);
    }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(0,122,255,0.25); border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .amount-wrap { position: relative; }
    .amount-unit {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 14px; color: var(--text2); pointer-events: none;
    }
    .ocr-status { font-size: 13px; text-align: center; padding: 6px 0; min-height: 24px; }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 0; border-bottom: 1px solid var(--bg);
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 14px; color: var(--text2); }
    .info-value { font-size: 14px; font-weight: 500; }
    /* Firebase setup guide */
    .step-box {
      background: #f9f9fb; border-radius: 12px; padding: 14px; margin-bottom: 10px;
    }
    .step-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; background: var(--primary); color: #fff;
      border-radius: 50%; font-size: 12px; font-weight: 700; margin-right: 8px;
      flex-shrink: 0;
    }
    .step-text { font-size: 14px; line-height: 1.6; }
    .fb-status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 10px; margin-bottom: 12px; font-size: 13px;
    }
    .fb-status-bar.connected { background: #edfaf2; color: #1a7a3c; }
    .fb-status-bar.offline    { background: #fff8ed; color: #8a5a00; }
    .fb-status-bar.none       { background: #f2f2f7; color: var(--text2); }
    textarea.form-input { resize: vertical; min-height: 120px; font-size: 13px; font-family: monospace; line-height: 1.4; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="header-title" id="hTitle">우리집 정산</div>
      <div class="header-sub" id="hSub">공동 지출 관리</div>
    </div>
    <div class="status-dot" id="statusDot" title="Firebase 연결 상태"></div>
  </div>
</div>

<div id="vHome"     class="view active"></div>
<div id="vAdd"      class="view"></div>
<div id="vList"     class="view"></div>
<div id="vSettle"   class="view"></div>
<div id="vSettings" class="view"></div>

<nav class="nav">
  <div class="nav-item active" id="nHome"     onclick="showView('Home')">    <span class="nav-icon">🏠</span>홈</div>
  <div class="nav-item"        id="nAdd"      onclick="showView('Add')">     <span class="nav-icon">➕</span>추가</div>
  <div class="nav-item"        id="nList"     onclick="showView('List')">    <span class="nav-icon">📋</span>내역</div>
  <div class="nav-item"        id="nSettle"   onclick="showView('Settle')">  <span class="nav-icon">💰</span>정산</div>
  <div class="nav-item"        id="nSettings" onclick="showView('Settings')"><span class="nav-icon">⚙️</span>설정</div>
</nav>

<div class="toast" id="toast"></div>
<div class="modal-bg hidden" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let S = {
  members:  ['멤버1','멤버2','멤버3','멤버4'],
  expenses: [],
};
let PREFS = { apiKey: '', fbConfigStr: '' }; // device-local only
let curView   = 'Home';
let curMonth  = new Date().toISOString().slice(0,7);
let addFS     = { photo: null, participants: [0,1,2,3], payer: 0 };
let fbDb      = null;
let fbConnected = false;

// ═══════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════
function loadPrefs() {
  try { const p = localStorage.getItem('hs_prefs'); if (p) PREFS = {...PREFS, ...JSON.parse(p)}; } catch(e){}
}
function savePrefs() {
  localStorage.setItem('hs_prefs', JSON.stringify(PREFS));
}
// Local fallback (used when Firebase not connected)
function saveLocal() {
  try { localStorage.setItem('hs_local', JSON.stringify(S)); } catch(e) {}
}
function loadLocal() {
  try { const d = localStorage.getItem('hs_local'); if (d) S = {...S, ...JSON.parse(d)}; } catch(e){}
}

// ═══════════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════════
function initFirebase(configStr) {
  try {
    const config = JSON.parse(configStr);
    if (!config.databaseURL) { toast('databaseURL이 없어요. Firebase 설정을 확인해주세요.'); return; }

    // Delete existing app then reinit
    const doInit = () => {
      const app = firebase.initializeApp(config, 'house');
      fbDb = firebase.database(app);

      // Monitor connection status
      fbDb.ref('.info/connected').on('value', snap => {
        fbConnected = !!snap.val();
        setDot(fbConnected ? 'on' : 'off');
      });

      // Real-time data listener
      fbDb.ref('/houseData').on('value', snap => {
        const d = snap.val();
        if (d) {
          if (Array.isArray(d.members) && d.members.length) S.members = d.members;
          S.expenses = d.expenses ? Object.values(d.expenses).filter(Boolean) : [];
        } else {
          // First connection — push current local data
          pushToFB();
        }
        saveLocal();
        render(curView);
      }, err => {
        toast('Firebase 오류: ' + (err.message || err));
        setDot('err');
      });

      toast('Firebase 연결됨');
    };

    // Clean up existing apps
    if (firebase.apps.length > 0) {
      Promise.all(firebase.apps.map(a => a.delete())).then(doInit).catch(doInit);
    } else {
      doInit();
    }
  } catch(e) {
    toast('설정 형식이 올바르지 않아요: ' + e.message);
  }
}

function pushToFB() {
  if (!fbDb) return;
  const expObj = {};
  S.expenses.forEach(e => { expObj[e.id] = e; });
  fbDb.ref('/houseData').set({ members: S.members, expenses: expObj });
}

function saveData() {
  if (fbDb && fbConnected) {
    pushToFB();
  } else {
    saveLocal();
    if (PREFS.fbConfigStr) toast('오프라인 — 로컬에 저장됨');
  }
}

function setDot(state) {
  const el = document.getElementById('statusDot');
  el.className = 'status-dot' + (state === 'on' ? ' on' : state === 'err' ? ' err' : '');
  el.title = state === 'on' ? 'Firebase 연결됨' : state === 'err' ? '연결 오류' : '로컬 저장';
}

// ═══════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('v'+name).classList.add('active');
  document.getElementById('n'+name).classList.add('active');
  curView = name;
  const meta = {
    Home:     ['우리집 정산','공동 지출 관리'],
    Add:      ['지출 추가','새 내역 기록'],
    List:     ['지출 내역','월별 내역 보기'],
    Settle:   ['정산하기','이번 달 결산'],
    Settings: ['설정','Firebase · 멤버 설정'],
  };
  document.getElementById('hTitle').textContent = meta[name][0];
  document.getElementById('hSub').textContent   = meta[name][1];
  render(name);
}
function render(n) {
  ({Home:renderHome,Add:renderAdd,List:renderList,Settle:renderSettle,Settings:renderSettings})[n]?.();
}

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
const fmt  = n => Math.round(n).toLocaleString('ko-KR')+'원';
const fmtD = s => { if(!s)return''; const d=new Date(s+'T00:00:00'); return`${d.getMonth()+1}/${d.getDate()}`; };
const fmtM = ym => { const[y,m]=ym.split('-'); return`${y}년 ${+m}월`; };
const addM = (ym,d) => { const[y,m]=ym.split('-').map(Number); return new Date(y,m-1+d,1).toISOString().slice(0,7); };
const today = () => new Date().toISOString().slice(0,10);
const uid   = () => Date.now().toString(36)+Math.random().toString(36).slice(2);
const monthExp = m => S.expenses.filter(e=>e.date?.startsWith(m));

function emoji(desc){
  const d=(desc||'').toLowerCase();
  if(/식|밥|점심|저녁|아침|마트|편의점|배달|치킨|삼겹/.test(d)) return'🍽️';
  if(/카페|커피|디저트|케이크/.test(d)) return'☕';
  if(/술|맥주|소주|막걸리|포차/.test(d)) return'🍺';
  if(/청소|세제|생필품|샴푸|화장지/.test(d)) return'🧹';
  if(/전기|가스|수도|관리비|인터넷|월세/.test(d)) return'💡';
  if(/영화|공연|놀이|게임/.test(d)) return'🎬';
  if(/택시|교통|주차|버스|지하철/.test(d)) return'🚗';
  if(/약|병원|의원/.test(d)) return'💊';
  return'💳';
}
function toast(msg,dur=2400){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}

// ═══════════════════════════════════════════════
// SETTLEMENT
// ═══════════════════════════════════════════════
function calcBal(exps){
  const bal=new Array(S.members.length).fill(0);
  for(const e of exps){
    if(!e.participants?.length) continue;
    const share=e.amount/e.participants.length;
    bal[e.payer]+=e.amount;
    for(const p of e.participants) bal[p]-=share;
  }
  return bal;
}
function calcTx(bal){
  const eps=0.9;
  const cr=bal.map((b,i)=>({i,b})).filter(x=>x.b>eps).sort((a,b)=>b.b-a.b);
  const de=bal.map((b,i)=>({i,b})).filter(x=>x.b<-eps).sort((a,b)=>a.b-b.b);
  const tx=[]; let ci=0,di=0;
  while(ci<cr.length&&di<de.length){
    const c=cr[ci],d=de[di];
    const amt=Math.min(c.b,-d.b);
    if(amt>eps) tx.push({from:d.i,to:c.i,amount:Math.round(amt)});
    c.b-=amt; d.b+=amt;
    if(c.b<eps)ci++; if(d.b>-eps)di++;
  }
  return tx;
}

// ═══════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════
function renderHome(){
  const exps=monthExp(curMonth);
  const total=exps.reduce((s,e)=>s+e.amount,0);
  const bal=calcBal(exps), tx=calcTx(bal);
  const recent=[...S.expenses].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);

  let h=`
    <div class="month-nav">
      <button class="month-btn" onclick="hmChg(-1)">‹</button>
      <div class="month-display">${fmtM(curMonth)}</div>
      <button class="month-btn" onclick="hmChg(1)">›</button>
    </div>
    <div class="summary-row">
      <div class="summary-box"><div class="summary-label">총 지출</div><div class="summary-value c-blue">${fmt(total)}</div></div>
      <div class="summary-box"><div class="summary-label">건수</div><div class="summary-value">${exps.length}건</div></div>

function togP(i){
  const arr=addFS.participants,pos=arr.indexOf(i);
  if(pos===-1)arr.push(i);
  else{if(arr.length<=1){toast('최소 1명은 선택해야 해요');return;}arr.splice(pos,1);}
  refresh();
}
function selPay(i){addFS.payer=i;if(!addFS.participants.includes(i))addFS.participants.push(i);refresh();}
function rmPhoto(){addFS.photo=null;refresh();}

async function onPhoto(input){
  if(!input.files?.[0])return;
  const compressed=await compressImg(input.files[0]);
  addFS.photo=compressed; refresh();
  if(PREFS.apiKey){
    const st=document.getElementById('ocrSt');
    if(st)st.innerHTML='<span class="spinner"></span><span style="color:var(--text2)">AI가 영수증을 분석 중…</span>';
    try{
      const info=await ocrReceipt(compressed,PREFS.apiKey);
      if(info.date){const el=document.getElementById('fDate');if(el)el.value=info.date;}
      if(info.amount>0){const el=document.getElementById('fAmt');if(el)el.value=info.amount;}
      if(info.description){const el=document.getElementById('fDesc');if(el)el.value=info.description;}
      const st2=document.getElementById('ocrSt');
      if(st2){st2.style.color='var(--success)';st2.textContent='✓ 자동 인식 완료! 내용을 확인해주세요.';}
    }catch(e){
      const st2=document.getElementById('ocrSt');
      if(st2){st2.style.color='var(--danger)';st2.textContent='인식 실패. 직접 입력해주세요.';}
    }
  }
}

function submitExp(){
  const date=document.getElementById('fDate').value;
  const desc=document.getElementById('fDesc').value.trim();
  const amount=parseInt(document.getElementById('fAmt').value);
  if(!date){toast('날짜를 선택해주세요');return;}
  if(!desc){toast('내역을 입력해주세요');return;}
  if(!amount||amount<=0){toast('올바른 금액을 입력해주세요');return;}
  if(!addFS.participants.length){toast('참여자를 선택해주세요');return;}
  S.expenses.push({
    id:uid(),date,description:desc,amount,
    payer:addFS.payer,
    participants:[...addFS.participants].sort((a,b)=>a-b),
    receiptPhoto:addFS.photo,
    createdAt:Date.now(),
  });
  saveData();
  toast('저장되었습니다 🎉');
  addFS={photo:null,participants:S.members.map((_,i)=>i),payer:0};
  showView('Home');
}

// IMAGE
// ═══════════════════════════════════════════════
function compressImg(file,maxW=900,q=0.65){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        let{width:w,height:hh}=img;
        if(w>maxW){hh=maxW/w*hh;w=maxW;}
        canvas.width=w;canvas.height=hh;
        canvas.getContext('2d').drawImage(img,0,0,w,hh);
        resolve(canvas.toDataURL('image/jpeg',q));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function ocrReceipt(img64,key){
  const b64=img64.split(',')[1];
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:200,messages:[{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
      {type:'text',text:'이 영수증 이미지에서 날짜, 총 금액(합계), 상호명을 추출해줘. 반드시 JSON만 반환: {"date":"YYYY-MM-DD","amount":숫자,"description":"상호명"} 날짜 없으면 오늘('+today()+'), 금액 없으면 0.'}
    ]}]})
  });
  if(!res.ok)throw new Error('API error');
  const data=await res.json();
  const text=data.content[0].text.trim();
  const m=text.match(/\{[\s\S]*?\}/);
  if(!m)throw new Error('no json');
  return JSON.parse(m[0]);
}

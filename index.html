<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>우리집 정산</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6c63ff;
      --primary-light: #ede9ff;
      --danger: #ff6b6b;
      --success: #51cf66;
      --warning: #ffa94d;
      --bg: #f8f7ff;
      --card: #ffffff;
      --text: #2d2d3a;
      --text2: #9896a4;
      --border: #ede9ff;
    }
    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #6c63ff 0%, #a78bfa 100%);
      padding: 18px 20px 16px;
      position: sticky; top: 0; z-index: 50;
    }
    .header-inner { display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      width: 38px; height: 38px;
      background: rgba(255,255,255,0.25);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .header-title {
      font-size: 18px; font-weight: 900; color: #fff;
      letter-spacing: -0.3px;
    }
    .header-sub { font-size: 11px; color: rgba(255,255,255,0.75); margin-top: 1px; }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.4); flex-shrink: 0;
      transition: background 0.4s;
    }
    .status-dot.on  { background: #69ff8e; box-shadow: 0 0 6px #69ff8e; }
    .status-dot.err { background: #ff6b6b; }

    /* ── NAV ── */
    .nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      background: #fff;
      border-top: 1px solid #f0eeff;
      display: flex; z-index: 50;
      padding-bottom: env(safe-area-inset-bottom, 0);
      box-shadow: 0 -4px 20px rgba(108,99,255,0.08);
    }
    .nav-item {
      flex: 1; padding: 10px 0 12px;
      text-align: center; cursor: pointer;
      font-size: 10px; font-weight: 500; color: var(--text2);
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item.active { color: var(--primary); }
    .nav-icon-wrap {
      width: 36px; height: 36px; margin: 0 auto 3px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .nav-item.active .nav-icon-wrap { background: var(--primary-light); }
    .nav-svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .nav-item.active .nav-svg { stroke: var(--primary); }

    /* ── VIEWS ── */
    .view { display: none; padding: 16px 16px 90px; }
    .view.active { display: block; }

    /* ── CARDS ── */
    .card {
      background: var(--card); border-radius: 18px;
      padding: 16px; margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(108,99,255,0.07);
    }

    /* ── MONTH NAV ── */
    .month-nav {
      display: flex; align-items: center; justify-content: center; gap: 20px;
      background: var(--card); border-radius: 18px; padding: 14px;
      margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(108,99,255,0.07);
    }
    .month-btn {
      width: 36px; height: 36px; border: none;
      background: var(--primary-light); color: var(--primary);
      border-radius: 50%; cursor: pointer; font-size: 20px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; font-weight: 700;
    }
    .month-display { font-size: 17px; font-weight: 700; min-width: 110px; text-align: center; }

    /* ── SUMMARY ── */
    .summary-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
    .summary-box {
      background: var(--card); border-radius: 18px; padding: 14px 8px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(108,99,255,0.07);
    }
    .summary-label { font-size: 11px; color: var(--text2); margin-bottom: 5px; }
    .summary-value { font-size: 15px; font-weight: 700; }
    .c-purple { color: var(--primary); }
    .c-red    { color: var(--danger); }
    .c-green  { color: var(--success); }
    .c-orange { color: var(--warning); }

    /* ── EXPENSE ITEM ── */
    .expense-item {
      display: flex; align-items: center; padding: 12px 0;
      border-bottom: 1px solid #f8f7ff; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .expense-item:last-child { border-bottom: none; }
    .expense-icon {
      width: 44px; height: 44px; background: var(--primary-light);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0; margin-right: 12px;
    }
    .expense-info { flex: 1; min-width: 0; }
    .expense-desc { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .expense-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }
    .expense-right { text-align: right; flex-shrink: 0; margin-left: 8px; }
    .expense-amount { font-size: 16px; font-weight: 700; }
    .expense-payer { font-size: 11px; color: var(--text2); margin-top: 3px; }

    /* ── SEC TITLE ── */
    .sec-title {
      font-size: 12px; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.8px; margin: 16px 0 8px 4px;
    }

    /* ── EMPTY ── */
    .empty { text-align: center; padding: 50px 20px; }
    .empty-icon { font-size: 52px; margin-bottom: 14px; }
    .empty-text { font-size: 16px; color: var(--text2); font-weight: 500; }
    .empty-sub { font-size: 13px; color: #ccc; margin-top: 6px; }

    /* ── FORM ── */
    .form-label {
      font-size: 12px; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; display: block;
    }
    .form-group { margin-bottom: 20px; }
    .form-input {
      width: 100%; padding: 13px 14px;
      border: 2px solid #f0eeff; border-radius: 14px;
      font-size: 16px; outline: none;
      background: var(--card); color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    .form-input:focus { border-color: var(--primary); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .chip {
      padding: 12px 6px; border: 2px solid #f0eeff; border-radius: 14px;
      text-align: center; cursor: pointer; font-size: 14px; font-weight: 600;
      transition: all 0.15s; user-select: none; background: var(--card);
      -webkit-tap-highlight-color: transparent;
    }
    .chip.sel-blue   { background: var(--primary); border-color: var(--primary); color: #fff; }
    .chip.sel-orange { background: var(--warning); border-color: var(--warning); color: #fff; }

    /* ── PHOTO ── */
    .photo-upload {
      border: 2px dashed #d9d3ff; border-radius: 14px; padding: 24px;
      text-align: center; cursor: pointer; background: #faf9ff;
      -webkit-tap-highlight-color: transparent;
    }
    .photo-prev-wrap { position: relative; }
    .photo-prev { width: 100%; max-height: 220px; object-fit: cover; border-radius: 12px; display: block; }
    .photo-remove {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.55); color: #fff; border: none;
      border-radius: 50%; width: 30px; height: 30px; cursor: pointer;
      font-size: 16px; display: flex; align-items: center; justify-content: center;
    }

    /* ── BUTTONS ── */
    .btn {
      width: 100%; padding: 15px; border: none; border-radius: 16px;
      font-size: 17px; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      font-family: 'Noto Sans KR', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: 0.8; transform: scale(0.98); }
    .btn-primary { background: linear-gradient(135deg, #6c63ff, #a78bfa); color: #fff; }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-ghost   { background: #f0eeff; color: var(--primary); }

    /* ── SETTLE ── */
    .settle-item {
      display: flex; align-items: center; padding: 14px 16px;
      background: linear-gradient(135deg, #f0eeff, #faf9ff);
      border-radius: 16px; margin-bottom: 10px;
      border: 1.5px solid #ede9ff;
    }
    .settle-from { font-size: 15px; font-weight: 700; flex: 1; }
    .settle-arrow { color: var(--primary); margin: 0 10px; font-size: 18px; flex-shrink: 0; }
    .settle-to { font-size: 15px; font-weight: 700; flex: 1; text-align: right; }
    .settle-amount { font-size: 17px; font-weight: 900; color: var(--primary); min-width: 90px; text-align: right; }

    /* ── BALANCE ── */
    .balance-row {
      display: flex; align-items: center; padding: 11px 0;
      border-bottom: 1px solid #f8f7ff;
    }
    .balance-row:last-child { border-bottom: none; }
    .balance-name { font-size: 14px; font-weight: 600; width: 56px; flex-shrink: 0; }
    .balance-bar-bg { flex: 1; height: 8px; background: #f0eeff; border-radius: 4px; margin: 0 10px; overflow: hidden; }
    .balance-bar { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
    .balance-num { font-size: 14px; font-weight: 700; min-width: 80px; text-align: right; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #2d2d3a; color: #fff;
      padding: 11px 24px; border-radius: 24px; font-size: 14px; font-weight: 500;
      z-index: 999; opacity: 0; transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── MODAL ── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(45,45,58,0.5);
      z-index: 100; display: flex; align-items: flex-end;
    }
    .modal-bg.hidden { display: none; }
    .modal {
      background: var(--card); border-radius: 24px 24px 0 0;
      padding: 20px; width: 100%; max-height: 85vh; overflow-y: auto;
      padding-bottom: calc(20px + env(safe-area-inset-bottom, 0));
    }
    .modal-handle { width: 36px; height: 4px; background: #ede9ff; border-radius: 2px; margin: 0 auto 18px; }

    /* ── SETTINGS ── */
    .setting-row {
      display: flex; align-items: center; padding: 12px 0;
      border-bottom: 1px solid #f8f7ff;
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-num {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      color: #fff; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0; margin-right: 12px;
    }
    .setting-input {
      flex: 1; border: none; outline: none;
      font-size: 16px; background: transparent; color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
    }

    /* ── MISC ── */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(108,99,255,0.2); border-top-color: var(--primary);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .amount-wrap { position: relative; }
    .amount-unit {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      font-size: 14px; color: var(--text2); pointer-events: none;
    }
    .ocr-status { font-size: 13px; text-align: center; padding: 6px 0; min-height: 24px; }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid #f8f7ff;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { font-size: 14px; color: var(--text2); }
    .info-value { font-size: 14px; font-weight: 600; }
    .fb-status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 14px; margin-bottom: 12px; font-size: 13px; font-weight: 500;
    }
    .fb-status-bar.connected { background: #edfaf2; color: #1a7a3c; }
    .fb-status-bar.offline    { background: #fff8ed; color: #8a5a00; }
    .fb-status-bar.none       { background: #f0eeff; color: var(--primary); cursor: pointer; }
    .step-box { background: #faf9ff; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; font-size: 14px; line-height: 1.6; }
    .step-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      color: #fff; border-radius: 50%; font-size: 12px; font-weight: 700; margin-right: 8px;
    }
    textarea.form-input { resize: vertical; min-height: 120px; font-size: 13px; font-family: monospace; line-height: 1.4; }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-logo">🏠</div>
      <div>
        <div class="header-title" id="hTitle">우리집 정산</div>
        <div class="header-sub" id="hSub">함께 쓰고 함께 나눠요</div>
      </div>
    </div>
    <div class="status-dot" id="statusDot" title="Firebase 연결 상태"></div>
  </div>
</div>

<!-- VIEWS -->
<div id="vHome"     class="view active"></div>
<div id="vAdd"      class="view"></div>
<div id="vList"     class="view"></div>
<div id="vSettle"   class="view"></div>
<div id="vSettings" class="view"></div>

<!-- NAV -->
<nav class="nav">
  <div class="nav-item active" id="nHome"     onclick="showView('Home')">
    <div class="nav-icon-wrap">
      <svg class="nav-svg" viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
    </div>홈
  </div>
  <div class="nav-item" id="nAdd"      onclick="showView('Add')">
    <div class="nav-icon-wrap">
      <svg class="nav-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
    </div>추가
  </div>
  <div class="nav-item" id="nList"     onclick="showView('List')">
    <div class="nav-icon-wrap">
      <svg class="nav-svg" viewBox="0 0 24 24"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/></svg>
    </div>내역
  </div>
  <div class="nav-item" id="nSettle"   onclick="showView('Settle')">
    <div class="nav-icon-wrap">
      <svg class="nav-svg" viewBox="0 0 24 24"><path d="M12 2a7 7 0 100 14A7 7 0 0012 2z"/><path d="M12 6v6l4 2"/><path d="M3 20l4-4M17 20l4-4M7 20h10"/></svg>
    </div>정산
  </div>
  <div class="nav-item" id="nSettings" onclick="showView('Settings')">
    <div class="nav-icon-wrap">
      <svg class="nav-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </div>설정
  </div>
</nav>

<div class="toast" id="toast"></div>
<div class="modal-bg hidden" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal"></div>
</div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let S = { members:['멤버1','멤버2','멤버3','멤버4'], expenses:[] };
let PREFS = { apiKey:'', fbConfigStr:'' };
const _now=new Date(); let curView='Home', curMonth=`${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}`;
let addFS={ photo:null, participants:[0,1,2,3], payer:0 };
let fbDb=null, fbConnected=false;

// ═══════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════
function loadPrefs(){ try{const p=localStorage.getItem('hs_prefs');if(p)PREFS={...PREFS,...JSON.parse(p)};}catch(e){} }
function savePrefs(){ localStorage.setItem('hs_prefs',JSON.stringify(PREFS)); }
function saveLocal(){ try{localStorage.setItem('hs_local',JSON.stringify(S));}catch(e){} }
function loadLocal(){ try{const d=localStorage.getItem('hs_local');if(d)S={...S,...JSON.parse(d)};}catch(e){} }

// ═══════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════
function initFirebase(configStr){
  try{
    const config=JSON.parse(configStr);
    if(!config.databaseURL){toast('databaseURL이 없어요. Firebase 설정을 확인해주세요.');return;}
    const doInit=()=>{
      const app=firebase.initializeApp(config,'house');
      fbDb=firebase.database(app);
      fbDb.ref('.info/connected').on('value',snap=>{fbConnected=!!snap.val();setDot(fbConnected?'on':'off');});
      fbDb.ref('/houseData').on('value',snap=>{
        const d=snap.val();
        if(d){if(Array.isArray(d.members)&&d.members.length)S.members=d.members;S.expenses=d.expenses?Object.values(d.expenses).filter(Boolean):[];}
        else{pushToFB();}
        saveLocal();render(curView);
      },err=>{toast('Firebase 오류: '+(err.message||err));setDot('err');});
      toast('Firebase 연결됐어요 ✨');
    };
    if(firebase.apps.length>0){Promise.all(firebase.apps.map(a=>a.delete())).then(doInit).catch(doInit);}
    else{doInit();}
  }catch(e){toast('설정 형식이 올바르지 않아요: '+e.message);}
}
function pushToFB(){
  if(!fbDb)return;
  const expObj={};S.expenses.forEach(e=>{expObj[e.id]=e;});
  fbDb.ref('/houseData').set({members:S.members,expenses:expObj});
}
function saveData(){
  if(fbDb&&fbConnected){pushToFB();}
  else{saveLocal();if(PREFS.fbConfigStr)toast('오프라인 — 로컬에 저장됐어요');}
}
function setDot(s){
  const el=document.getElementById('statusDot');
  el.className='status-dot'+(s==='on'?' on':s==='err'?' err':'');
}

// ═══════════════════════════════════════
// NAV
// ═══════════════════════════════════════
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('v'+name).classList.add('active');
  document.getElementById('n'+name).classList.add('active');
  curView=name;
  const meta={
    Home:['우리집 정산','함께 쓰고 함께 나눠요'],
    Add:['지출 추가','새 내역 기록하기'],
    List:['지출 내역','월별 내역 보기'],
    Settle:['정산하기','이번 달 결산'],
    Settings:['설정','멤버 & Firebase 설정'],
  };
  document.getElementById('hTitle').textContent=meta[name][0];
  document.getElementById('hSub').textContent=meta[name][1];
  render(name);
}
function render(n){({Home:renderHome,Add:renderAdd,List:renderList,Settle:renderSettle,Settings:renderSettings})[n]?.();}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
const fmt=n=>Math.round(n).toLocaleString('ko-KR')+'원';
const fmtD=s=>{if(!s)return'';const d=new Date(s+'T00:00:00');return`${d.getMonth()+1}/${d.getDate()}`;};
const fmtM=ym=>{const[y,m]=ym.split('-');return`${y}년 ${+m}월`;};
const addM=(ym,d)=>{const[y,m]=ym.split('-').map(Number);const nd=new Date(y,m-1+d,1);return`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}`;};
const today=()=>{const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const monthExp=m=>S.expenses.filter(e=>e.date?.startsWith(m));
function emoji(desc){
  const d=(desc||'').toLowerCase();
  if(/식|밥|점심|저녁|아침|마트|편의점|배달|치킨|삼겹/.test(d))return'🍽️';
  if(/카페|커피|디저트|케이크/.test(d))return'☕';
  if(/술|맥주|소주|막걸리|포차/.test(d))return'🍺';
  if(/청소|세제|생필품|샴푸|화장지/.test(d))return'🧹';
  if(/전기|가스|수도|관리비|인터넷|월세/.test(d))return'💡';
  if(/영화|공연|놀이|게임/.test(d))return'🎬';
  if(/택시|교통|주차|버스|지하철/.test(d))return'🚗';
  if(/약|병원|의원/.test(d))return'💊';
  return'💳';
}
function toast(msg,dur=2400){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),dur);
}

function calcBal(exps){
  const bal=new Array(S.members.length).fill(0);
  for(const e of exps){
    if(!e.participants?.length)continue;
    const share=e.amount/e.participants.length;
    bal[e.payer]+=e.amount;
    for(const p of e.participants)bal[p]-=share;
  }
  return bal;
}
function calcTx(bal){
  const eps=0.9;
  const cr=bal.map((b,i)=>({i,b})).filter(x=>x.b>eps).sort((a,b)=>b.b-a.b);
  const de=bal.map((b,i)=>({i,b})).filter(x=>x.b<-eps).sort((a,b)=>a.b-b.b);
  const tx=[];let ci=0,di=0;
  while(ci<cr.length&&di<de.length){
    const c=cr[ci],d=de[di];const amt=Math.min(c.b,-d.b);
    if(amt>eps)tx.push({from:d.i,to:c.i,amount:Math.round(amt)});
    c.b-=amt;d.b+=amt;
    if(c.b<eps)ci++;if(d.b>-eps)di++;
  }
  return tx;
}

    <div class="form-group"><label class="form-label">금액</label><div class="amount-wrap"><input type="number" class="form-input" id="fAmt" placeholder="0" inputmode="numeric" style="padding-right:40px"><span class="amount-unit">원</span></div></div>

function getSavedInputs(){return{date:document.getElementById('fDate')?.value||today(),desc:document.getElementById('fDesc')?.value||'',amount:document.getElementById('fAmt')?.value||''};}
function restoreInputs(v){const d=document.getElementById('fDate'),de=document.getElementById('fDesc'),a=document.getElementById('fAmt');if(d)d.value=v.date;if(de)de.value=v.desc;if(a)a.value=v.amount;}
function refresh(){const v=getSavedInputs();document.getElementById('vAdd').innerHTML=buildForm();restoreInputs(v);}
function togP(i){const arr=addFS.participants,pos=arr.indexOf(i);if(pos===-1)arr.push(i);else{if(arr.length<=1){toast('최소 1명은 선택해야 해요');return;}arr.splice(pos,1);}refresh();}
function selPay(i){addFS.payer=i;if(!addFS.participants.includes(i))addFS.participants.push(i);refresh();}
function rmPhoto(){addFS.photo=null;refresh();}
async function onPhoto(input){
  if(!input.files?.[0])return;
  const compressed=await compressImg(input.files[0]);
  addFS.photo=compressed;refresh();
  if(PREFS.apiKey){
    const st=document.getElementById('ocrSt');
    if(st)st.innerHTML='<span class="spinner"></span><span style="color:var(--text2)">AI가 영수증을 읽고 있어요…</span>';
    try{
      const info=await ocrReceipt(compressed,PREFS.apiKey);
      if(info.date){const el=document.getElementById('fDate');if(el)el.value=info.date;}
      if(info.amount>0){const el=document.getElementById('fAmt');if(el)el.value=info.amount;}
      if(info.description){const el=document.getElementById('fDesc');if(el)el.value=info.description;}
      const st2=document.getElementById('ocrSt');
      if(st2){st2.style.color='var(--success)';st2.textContent='✓ 자동 인식 완료! 확인해주세요.';}
    }catch(e){
      const st2=document.getElementById('ocrSt');
      if(st2){st2.style.color='var(--danger)';st2.textContent='인식 실패. 직접 입력해주세요.';}
    }
  }
}
function submitExp(){
  const date=document.getElementById('fDate').value;
  const desc=document.getElementById('fDesc').value.trim();
  const amount=parseInt(document.getElementById('fAmt').value);
  if(!date){toast('날짜를 선택해주세요');return;}
  if(!desc){toast('내역을 입력해주세요');return;}
  if(!amount||amount<=0){toast('올바른 금액을 입력해주세요');return;}
  if(!addFS.participants.length){toast('참여자를 선택해주세요');return;}
  S.expenses.push({id:uid(),date,description:desc,amount,payer:addFS.payer,participants:[...addFS.participants].sort((a,b)=>a-b),receiptPhoto:addFS.photo,createdAt:Date.now()});
  saveData();toast('저장됐어요 🎉');
  addFS={photo:null,participants:S.members.map((_,i)=>i),payer:0};
  showView('Home');
}

      <button class="btn btn-danger" onclick="clearAll()">모든 데이터 삭제</button>
    </div>`;
}
function saveMembers(){S.members=S.members.map((_,i)=>document.getElementById(`mn${i}`)?.value.trim()||`멤버${i+1}`);saveData();toast('저장됐어요 ✨');}
function saveFbConfig(){
  const raw=document.getElementById('fbConf').value.trim();
  if(!raw){toast('설정을 입력해주세요');return;}
  const m=raw.match(/\{[\s\S]*\}/);const str=m?m[0]:raw;
  PREFS.fbConfigStr=str;savePrefs();initFirebase(str);renderSettings();
}
function saveApiKey(){PREFS.apiKey=document.getElementById('apiK').value.trim();savePrefs();toast(PREFS.apiKey?'API 키 저장됐어요':'API 키 삭제됐어요');}
function clearAll(){if(!confirm('모든 데이터를 삭제할까요?'))return;S.expenses=[];saveData();toast('삭제됐어요');renderSettings();}

// ═══════════════════════════════════════
// IMAGE & OCR
// ═══════════════════════════════════════
function compressImg(file,maxW=900,q=0.65){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{const img=new Image();img.onload=()=>{const canvas=document.createElement('canvas');let{width:w,height:hh}=img;if(w>maxW){hh=maxW/w*hh;w=maxW;}canvas.width=w;canvas.height=hh;canvas.getContext('2d').drawImage(img,0,0,w,hh);resolve(canvas.toDataURL('image/jpeg',q));};img.src=e.target.result;};
    reader.readAsDataURL(file);
  });
}
async function ocrReceipt(img64,key){
  const b64=img64.split(',')[1];
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:200,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},{type:'text',text:'이 영수증에서 날짜, 총 금액, 상호명 추출. JSON만 반환: {"date":"YYYY-MM-DD","amount":숫자,"description":"상호명"} 날짜 없으면 오늘('+today()+'), 금액 없으면 0.'}]}]})});
  if(!res.ok)throw new Error('API error');
  const data=await res.json();const text=data.content[0].text.trim();
  const m=text.match(/\{[\s\S]*?\}/);if(!m)throw new Error('no json');
  return JSON.parse(m[0]);
}
